name: Deploy to AWS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}
      - run: pip install -r requirements.txt
      - run: pytest tests/ --tb=short -q
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:test@localhost/test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-deploy
          aws-region: us-east-1

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/ai-org-backend:$IMAGE_TAG ./backend
          docker push $ECR_REGISTRY/ai-org-backend:$IMAGE_TAG
          echo "backend_image=$ECR_REGISTRY/ai-org-backend:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Deploy with Terraform
        working-directory: terraform
        run: |
          terraform init
          terraform apply -auto-approve \
            -var="backend_image=${{ steps.build.outputs.backend_image }}" \
            -var="environment=production"

      - name: Verify deployment
        run: |
          curl -f $(terraform output -raw alb_dns_name)/health || exit 1