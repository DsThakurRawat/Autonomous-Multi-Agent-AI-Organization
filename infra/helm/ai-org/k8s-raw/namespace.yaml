apiVersion: v1
kind: Namespace
metadata:
  name: ai-org
  labels:
    app.kubernetes.io/name: ai-org
    app.kubernetes.io/managed-by: kubectl
---
# Resource Quota per namespace
apiVersion: v1
kind: ResourceQuota
metadata:
  name: ai-org-quota
  namespace: ai-org
spec:
  hard:
    requests.cpu: "20"
    requests.memory: 40Gi
    limits.cpu: "40"
    limits.memory: 80Gi
    pods: "50"
    services: "20"
---
# LimitRange — default resource constraints for all pods
apiVersion: v1
kind: LimitRange
metadata:
  name: ai-org-limits
  namespace: ai-org
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "256Mi"
      max:
        cpu: "4"
        memory: "8Gi"
