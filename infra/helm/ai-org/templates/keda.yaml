{{- if .Values.keda.enabled }}
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ include "ai-org.fullname" . }}-moe-scoring
  labels:
    app: moe-scoring
spec:
  scaleTargetRef:
    name: {{ include "ai-org.fullname" . }}-moe-scoring
  pollingInterval: {{ .Values.keda.pollingInterval }}
  cooldownPeriod: {{ .Values.keda.cooldownPeriod }}
  minReplicaCount: {{ .Values.keda.minReplicaCount }}
  maxReplicaCount: {{ .Values.keda.maxReplicaCount }}
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: {{ include "ai-org.fullname" . }}-kafka:9092
        consumerGroup: moe-scoring-group
        topic: ai-org-tasks
        lagThreshold: "10"
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ include "ai-org.fullname" . }}-orchestrator
  labels:
    app: orchestrator
spec:
  scaleTargetRef:
    name: {{ include "ai-org.fullname" . }}-orchestrator
  pollingInterval: {{ .Values.keda.pollingInterval }}
  cooldownPeriod: {{ .Values.keda.cooldownPeriod }}
  minReplicaCount: {{ .Values.keda.minReplicaCount }}
  maxReplicaCount: {{ .Values.keda.maxReplicaCount }}
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: {{ include "ai-org.fullname" . }}-kafka:9092
        consumerGroup: orchestrator-group
        topic: ai-org-results
        lagThreshold: "5"
{{- end }}
