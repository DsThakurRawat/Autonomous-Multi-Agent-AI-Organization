apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-org.fullname" . }}-orchestrator
  labels:
    app: orchestrator
spec:
  replicas: {{ .Values.orchestrator.replicaCount }}
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      containers:
        - name: orchestrator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "-m", "orchestrator.main"]
          envFrom:
            - configMapRef:
                name: {{ include "ai-org.fullname" . }}-config
            - secretRef:
                name: {{ include "ai-org.fullname" . }}-secrets
          env:
             - name: REDIS_URL
               value: redis://{{ include "ai-org.fullname" . }}-redis:6379 
             - name: POSTGRES_URL
               value: postgresql+asyncpg://{{ .Values.postgresql.auth.username }}:$(postgres-password)@{{ include "ai-org.fullname" . }}-postgresql:5432/{{ .Values.postgresql.auth.database }}
             - name: KAFKA_BOOTSTRAP_SERVERS
               value: {{ include "ai-org.fullname" . }}-kafka:9092
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-org.fullname" . }}-api-gateway
  labels:
    app: api-gateway
spec:
  replicas: {{ .Values.apiGateway.replicaCount }}
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
          envFrom:
            - configMapRef:
                name: {{ include "ai-org.fullname" . }}-config
            - secretRef:
                name: {{ include "ai-org.fullname" . }}-secrets
          ports:
            - containerPort: 8000
              name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-org.fullname" . }}-dashboard
  labels:
    app: dashboard
spec:
  replicas: {{ .Values.dashboard.replicaCount }}
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
        - name: dashboard
          image: "{{ .Values.image.repository }}-dashboard:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3000
              name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-org.fullname" . }}-moe-scoring
  labels:
    app: moe-scoring
spec:
  replicas: {{ .Values.moeScoring.replicaCount }}
  selector:
    matchLabels:
      app: moe-scoring
  template:
    metadata:
      labels:
        app: moe-scoring
    spec:
      {{- if .Values.gvisor.enabled }}
      runtimeClassName: {{ .Values.gvisor.runtimeClassName | default "gvisor" }}
      {{- end }}
      containers:
        - name: moe-scoring
          image: "{{ .Values.image.repository }}-moe:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8090
              name: http

{{- range $key, $agent := .Values.agents }}
{{- if $agent.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-org.fullname" $ }}-agent-{{ $key }}
  labels:
    app: agent-{{ $key }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-{{ $key }}
  template:
    metadata:
      labels:
        app: agent-{{ $key }}
    spec:
      {{- if $.Values.gvisor.enabled }}
      runtimeClassName: {{ $.Values.gvisor.runtimeClassName | default "gvisor" }}
      {{- end }}
      containers:
        - name: agent
          image: "{{ $.Values.image.repository }}:{{ $.Values.image.tag }}"
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          command: ["python", "-m", "agents.agent_service"]
          envFrom:
            - configMapRef:
                name: {{ include "ai-org.fullname" $ }}-config
            - secretRef:
                name: {{ include "ai-org.fullname" $ }}-secrets
          env:
             - name: AGENT_ROLE
               value: "{{ $agent.roleName }}"
             - name: KAFKA_BOOTSTRAP_SERVERS
               value: {{ include "ai-org.fullname" $ }}-kafka:9092
{{- end }}
{{- end }}
