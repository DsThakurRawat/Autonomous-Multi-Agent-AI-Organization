apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-org.fullname" . }}-secrets
  labels:
    {{- include "ai-org.labels" . | nindent 4 }}
type: Opaque
stringData:
  postgres-password: {{ .Values.postgresql.auth.password | quote }}
  POSTGRES_URL: "postgresql+asyncpg://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ include "ai-org.fullname" . }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
  OPENAI_API_KEY: {{ .Values.secretKeys.openaiKey | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secretKeys.anthropicKey | quote }}
