# ClusterIP Services for all workloads
# ──────────────────────────────────────────────────────────────────────────────

# API Gateway
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-org.fullname" . }}-api-gateway
  labels:
    {{- include "ai-org.labels" . | nindent 4 }}
    app.kubernetes.io/component: api-gateway
spec:
  type: {{ .Values.apiGateway.service.type }}
  ports:
    - port: {{ .Values.apiGateway.service.port }}
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: api-gateway

---
# Dashboard (Next.js)
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-org.fullname" . }}-dashboard
  labels:
    {{- include "ai-org.labels" . | nindent 4 }}
    app.kubernetes.io/component: dashboard
spec:
  type: {{ .Values.dashboard.service.type }}
  ports:
    - port: {{ .Values.dashboard.service.port }}
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: dashboard

---
# Orchestrator (internal only)
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-org.fullname" . }}-orchestrator
  labels:
    {{- include "ai-org.labels" . | nindent 4 }}
    app.kubernetes.io/component: orchestrator
spec:
  type: ClusterIP
  ports:
    - port: 9000
      targetPort: 9000
      protocol: TCP
      name: grpc
  selector:
    app: orchestrator

---
# Rust MoE Scoring
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-org.fullname" . }}-moe-scoring
  labels:
    {{- include "ai-org.labels" . | nindent 4 }}
    app.kubernetes.io/component: moe-scoring
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.moeScoring.service.port }}
      targetPort: 8090
      protocol: TCP
      name: http
  selector:
    app: moe-scoring

---
# PostgreSQL
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-org.fullname" . }}-postgresql
  labels:
    {{- include "ai-org.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.postgresql.service.port }}
      targetPort: 5432
      protocol: TCP
      name: tcp-postgresql
  selector:
    app: postgresql

---
# Redis
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-org.fullname" . }}-redis
  labels:
    {{- include "ai-org.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.redis.service.port }}
      targetPort: 6379
      protocol: TCP
      name: tcp-redis
  selector:
    app: redis

---
# Zookeeper
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-org.fullname" . }}-zookeeper
  labels:
    {{- include "ai-org.labels" . | nindent 4 }}
    app.kubernetes.io/component: zookeeper
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.kafka.zookeeper.service.clientPort }}
      targetPort: 2181
      protocol: TCP
      name: client
  selector:
    app: zookeeper

---
# Kafka
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-org.fullname" . }}-kafka
  labels:
    {{- include "ai-org.labels" . | nindent 4 }}
    app.kubernetes.io/component: kafka
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.kafka.service.port }}
      targetPort: 9092
      protocol: TCP
      name: kafka
  selector:
    app: kafka
