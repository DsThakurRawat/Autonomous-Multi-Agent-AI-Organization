apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ai-org.fullname" . }}-ingress
  labels:
    {{- include "ai-org.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
spec:
  ingressClassName: {{ .Values.apiGateway.ingress.className | default "nginx" }}
  rules:
    - host: api.{{ .Values.global.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "ai-org.fullname" . }}-api-gateway
                port:
                  number: {{ .Values.apiGateway.service.port }}
    - host: app.{{ .Values.global.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "ai-org.fullname" . }}-dashboard
                port:
                  number: {{ .Values.dashboard.service.port }}
