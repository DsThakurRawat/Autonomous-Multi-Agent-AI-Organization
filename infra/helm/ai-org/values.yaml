# Default values for ai-org.
# This is a YAML-formatted file.

global:
  nameOverride: ""
  fullnameOverride: ""
  domain: localhost # Base domain for ingress
  environment: pt-dev

# Docker images configuration
image:
  repository: aiorg # Your private or public registry prefix
  pullPolicy: IfNotPresent
  tag: "latest"

# Common environment variables configMap
env:
  logLevel: info
  kafkaMode: "true"

# Service API Gateway
apiGateway:
  replicaCount: 1
  service:
    type: ClusterIP
    port: 8000
  ingress:
    enabled: true
    className: ""
    path: /
    pathType: Prefix

# Web Dashboard (Next.js)
dashboard:
  replicaCount: 1
  service:
    type: ClusterIP
    port: 3000

# Orchestrator
orchestrator:
  replicaCount: 1

# Agents configuration (1 replica each)
agents:
  ceo:
    enabled: true
    roleName: "CEO"
  cto:
    enabled: true
    roleName: "CTO"
  engineerBackend:
    enabled: true
    roleName: "Engineer_Backend"
  engineerFrontend:
    enabled: true
    roleName: "Engineer_Frontend"
  qa:
    enabled: true
    roleName: "QA"
  devops:
    enabled: true
    roleName: "DevOps"
  finance:
    enabled: true
    roleName: "Finance"

# Rust MoE Scoring Endpoint
moeScoring:
  replicaCount: 1
  service:
    port: 8090

# Infrastructure Dependencies overrides
postgresql:
  replicaCount: 1
  service:
    port: 5432
  auth:
    username: ai_admin
    password: CHANGEME  # Override via --set or sealed-secrets
    database: ai_org_db

redis:
  replicaCount: 1
  service:
    port: 6379

kafka:
  replicaCount: 1
  service:
    port: 9092
  zookeeper:
    service:
      clientPort: 2181

# API Secrets (should ideally be sealed-secrets or via external secrets operator)
secretKeys:
  openaiKey: "sk-..."
  anthropicKey: "sk-ant-..."
