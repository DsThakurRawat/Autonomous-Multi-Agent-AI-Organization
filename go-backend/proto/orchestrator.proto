syntax = "proto3";

package orchestrator;
option go_package = "github.com/DsThakurRawat/autonomous-org/go-backend/proto/gen/orchestrator";

import "google/protobuf/timestamp.proto";

// ── Orchestrator Service ─────────────────────────────────────────────────────

service OrchestratorService {
  // Create a new project from a business idea — starts the full AI pipeline
  rpc CreateProject(CreateProjectRequest) returns (ProjectResponse);
  // Get current state of a project + its DAG
  rpc GetProject(GetProjectRequest) returns (ProjectResponse);
  // Stream live task events for a project (used by ws-hub)
  rpc StreamEvents(StreamEventsRequest) returns (stream AgentEvent);
  // Cancel a running project — stops all pending tasks
  rpc CancelProject(CancelProjectRequest) returns (StatusResponse);
  // Re-queue a failed task for retry
  rpc RetryTask(RetryTaskRequest) returns (StatusResponse);
}

// ── Request / Response Messages ───────────────────────────────────────────────

message CreateProjectRequest {
  string tenant_id = 1;
  string user_id   = 2;
  string idea      = 3;
  BudgetConfig budget = 4;
}

message BudgetConfig {
  double max_cost_usd   = 1;  // Hard cap — pipeline halts if exceeded
  int64  max_tokens     = 2;  // Total token budget
  string alert_webhook  = 3;  // Optional Slack/webhook URL for budget alerts
}

message GetProjectRequest {
  string project_id = 1;
  string tenant_id  = 2;  // For tenant isolation enforcement
}

message StreamEventsRequest {
  string project_id = 1;
}

message CancelProjectRequest {
  string project_id = 1;
  string reason     = 2;
}

message RetryTaskRequest {
  string task_id    = 1;
  string project_id = 2;
}

// ── Core Domain Messages ──────────────────────────────────────────────────────

message ProjectResponse {
  string project_id = 1;
  string tenant_id  = 2;
  string user_id    = 3;
  string idea       = 4;
  ProjectStatus status = 5;
  repeated Task tasks  = 6;
  CostReport cost      = 7;
  google.protobuf.Timestamp created_at   = 8;
  google.protobuf.Timestamp completed_at = 9;
}

message Task {
  string task_id    = 1;
  string name       = 2;
  string task_type  = 3;
  string agent_role = 4;
  TaskStatus status = 5;
  repeated string depends_on = 6;  // task_ids this task depends on
  int32  retry_count  = 7;
  int32  duration_ms  = 8;
  string error_msg    = 9;
  google.protobuf.Timestamp created_at   = 10;
  google.protobuf.Timestamp started_at   = 11;
  google.protobuf.Timestamp completed_at = 12;
}

message AgentEvent {
  string event_id   = 1;
  string project_id = 2;
  string task_id    = 3;
  string agent_role = 4;
  string event_type = 5;  // task_start | task_complete | task_failed | heartbeat | budget_alert
  string message    = 6;
  string level      = 7;  // info | success | warning | error
  string trace_id   = 8;
  google.protobuf.Timestamp timestamp = 9;
}

message CostReport {
  double total_cost_usd = 1;
  int64  total_tokens   = 2;
  double budget_usd     = 3;
  double budget_used_pct = 4;
  repeated AgentCost per_agent = 5;
}

message AgentCost {
  string agent_role  = 1;
  double cost_usd    = 2;
  int64  tokens_used = 3;
  string model_used  = 4;
}

message StatusResponse {
  bool   success = 1;
  string message = 2;
}

// ── Enums ─────────────────────────────────────────────────────────────────────

enum ProjectStatus {
  PROJECT_STATUS_UNSPECIFIED = 0;
  PROJECT_STATUS_PENDING     = 1;
  PROJECT_STATUS_PLANNING    = 2;
  PROJECT_STATUS_RUNNING     = 3;
  PROJECT_STATUS_DONE        = 4;
  PROJECT_STATUS_FAILED      = 5;
  PROJECT_STATUS_CANCELLED   = 6;
}

enum TaskStatus {
  TASK_STATUS_UNSPECIFIED = 0;
  TASK_STATUS_PENDING     = 1;
  TASK_STATUS_RUNNING     = 2;
  TASK_STATUS_DONE        = 3;
  TASK_STATUS_FAILED      = 4;
  TASK_STATUS_SKIPPED     = 5;
}
