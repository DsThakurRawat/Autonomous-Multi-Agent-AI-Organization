syntax = "proto3";

package tenant;
option go_package = "github.com/DsThakurRawat/autonomous-org/go-backend/proto/gen/tenant";

import "google/protobuf/timestamp.proto";

service TenantService {
  rpc CreateTenant(CreateTenantRequest) returns (TenantResponse);
  rpc GetTenant(GetTenantRequest)       returns (TenantResponse);
  rpc CreateUser(CreateUserRequest)     returns (UserResponse);
  rpc GetUser(GetUserRequest)           returns (UserResponse);
  rpc GetUserByGoogleSub(GetUserByGoogleSubRequest) returns (UserResponse);
  rpc GetUsage(GetUsageRequest)         returns (UsageResponse);
  rpc CheckQuota(CheckQuotaRequest)     returns (QuotaCheckResponse);
}

message CreateTenantRequest {
  string name = 1;
  string plan = 2;  // free | pro | enterprise
}

message GetTenantRequest {
  string tenant_id = 1;
}

message CreateUserRequest {
  string tenant_id    = 1;
  string google_sub   = 2;
  string email        = 3;
  string display_name = 4;
  string role         = 5;  // owner | admin | member | viewer
}

message GetUserRequest {
  string user_id = 1;
}

message GetUserByGoogleSubRequest {
  string google_sub = 1;
}

message GetUsageRequest {
  string tenant_id = 1;
  string period    = 2;  // current_month | last_month | all_time
}

message CheckQuotaRequest {
  string tenant_id    = 1;
  int64  tokens_needed = 2;
}

message TenantResponse {
  string tenant_id     = 1;
  string name          = 2;
  string plan          = 3;
  int32  max_projects  = 4;
  int64  max_tokens_mo = 5;
  google.protobuf.Timestamp created_at = 6;
}

message UserResponse {
  string user_id      = 1;
  string tenant_id    = 2;
  string email        = 3;
  string display_name = 4;
  string role         = 5;
  google.protobuf.Timestamp created_at = 6;
}

message UsageResponse {
  string tenant_id      = 1;
  string period         = 2;
  int64  tokens_used    = 3;
  double cost_usd       = 4;
  int32  projects_run   = 5;
  int64  tokens_budget  = 6;
  double budget_used_pct = 7;
}

message QuotaCheckResponse {
  bool   allowed       = 1;
  string reason        = 2;
  int64  tokens_left   = 3;
}
