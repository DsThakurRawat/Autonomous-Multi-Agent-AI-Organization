version: '3.8'

services:
  # ── Go Microservices ────────────────────────────────────────────────────────
  gateway:
    build:
      context: ../
      dockerfile: deploy/dockerfiles/Dockerfile.gateway
    ports:
      - "8080:8080"
    environment:
      - AI_ORG_ENV=local
      - AI_ORG_SERVER__PORT=8080
      - AI_ORG_POSTGRES__DSN=postgres://aiorg:secret@postgres:5432/aiorg?sslmode=disable
      - AI_ORG_REDIS__ADDR=redis:6379
      - AI_ORG_KAFKA__BROKERS=kafka:29092
      - AI_ORG_ORCHESTRATOR_TARGET=orchestrator:9090
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - aiorg-net

  orchestrator:
    build:
      context: ../
      dockerfile: deploy/dockerfiles/Dockerfile.orchestrator
    ports:
      - "9090:9090"
    environment:
      - AI_ORG_ENV=local
      - AI_ORG_SERVER__GRPC_PORT=9090
      - AI_ORG_POSTGRES__DSN=postgres://aiorg:secret@postgres:5432/aiorg?sslmode=disable
      - AI_ORG_REDIS__ADDR=redis:6379
      - AI_ORG_KAFKA__BROKERS=kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - aiorg-net

  ws-hub:
    build:
      context: ../
      dockerfile: deploy/dockerfiles/Dockerfile.ws-hub
    ports:
      - "8081:8081"
    environment:
      - AI_ORG_ENV=local
      - AI_ORG_SERVER__PORT=8081
      - AI_ORG_REDIS__ADDR=redis:6379
      - AI_ORG_KAFKA__BROKERS=kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - aiorg-net

  # ── Python AI Agents ────────────────────────────────────────────────────────
  agent-ceo:
    build:
      context: ../../
      dockerfile: Dockerfile.agent
      args:
        AGENT_ROLE: CEO
    environment:
      - AGENT_ROLE=CEO
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - aiorg-net

  agent-cto:
    build:
      context: ../../
      dockerfile: Dockerfile.agent
      args:
        AGENT_ROLE: CTO
    environment:
      - AGENT_ROLE=CTO
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - aiorg-net

  agent-engineer:
    build:
      context: ../../
      dockerfile: Dockerfile.agent
      args:
        AGENT_ROLE: Engineer_Backend
    environment:
      - AGENT_ROLE=Engineer_Backend
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - aiorg-net

  # ── Infrastructure ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=aiorg
      - POSTGRES_PASSWORD=secret
      - POSTGRES_DB=aiorg
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U aiorg" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - aiorg-net
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - aiorg-net
    volumes:
      - redisdata:/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - aiorg-net

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: [ "CMD", "nc", "-z", "localhost", "9092" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aiorg-net

networks:
  aiorg-net:


volumes:
  pgdata:
  redisdata:
