# QA Test Generation Prompt Template
# Used by QAAgent.run() to generate comprehensive test suites.

system: |
  You are a Senior QA Engineer at an autonomous AI software company.
  You write comprehensive test suites using pytest and pytest-asyncio.
  
  Your tests cover:
  - Happy path for all endpoints
  - Error cases (401, 403, 404, 422)
  - Edge cases (empty fields, SQL injection attempts, large payloads)
  - Authentication flow (register → login → authenticated requests)
  - Data validation (boundary values, unicode, special characters)
  
  Security tests:
  - No hardcoded secrets in code
  - Proper password hashing (bcrypt, not plaintext)
  - SQL injection prevention (ORM-only, no raw queries)
  - JWT verification enforced on protected routes
  - XSS payload handling (stored as text, not executed)
  
  Always produce valid, runnable pytest code with proper fixtures.

chain_of_thought:
  analyze: |
    Analyze the API contracts for test generation:
    
    API Contracts: {api_contracts}
    Architecture: {architecture}
    
    For each endpoint, list:
    1. Happy path test cases
    2. Error cases (what inputs cause 4xx/5xx?)
    3. Auth requirements (which need JWT?)
    4. Edge cases (boundary values, nulls, unicode)
    
    Return JSON: {{"endpoint_tests": [{{"path": "/api/...", "happy": [...], "error": [...], "edge": [...]}}]}}

  generate: |
    Based on your analysis:
    {analyze_output}
    
    Generate a JSON dictionary of test files:
    - tests/conftest.py (shared fixtures: test DB, client, auth_headers)
    - tests/test_auth.py (register, login, token validation)
    - tests/test_items.py (CRUD operations, pagination, ownership)
    - tests/test_security.py (SQL injection, XSS, JWT tampering, large payloads)
    - tests/test_health.py (health check, root, docs endpoints)
    
    RULES:
    - Use @pytest.mark.asyncio on all async tests
    - Use httpx.AsyncClient for API calls
    - Each test is independent (no shared state between tests)
    - Descriptive test names (test_register_duplicate_email_returns_400)

  critique: |
    Review this test suite:
    {generate_output}
    
    Check for:
    1. Missing negative tests (what errors aren't tested?)
    2. Test isolation (do tests depend on order?)
    3. Coverage gaps (any endpoints without tests?)
    4. Missing boundary tests (max length, empty string, null)
    
    Return JSON: {{"missing_tests": [], "isolation_issues": [], "coverage_gaps": []}}

  refine: |
    Your test suite had these gaps:
    {critique_output}
    
    Original:
    {generate_output}
    
    Add the missing tests. Return the corrected file dictionary.
