# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.prod.yml — Oracle Cloud Production Overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This file overrides the base docker-compose.yml for production:
#   - Removes exposed localhost ports (everything goes through Cloudflare Tunnel)
#   - Sets production environment flags
#   - Enables the cloudflared tunnel service
#   - Disables AUTH_DISABLED (real login required)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Core: production env overrides ─────────────────────────────────────────

  api-gateway:
    ports: []   # No direct host exposure — Cloudflare Tunnel handles it
    environment:
      AI_ORG_ENV: production
      AUTH_DISABLED: "false"
      CORS_ORIGINS: "${CORS_ORIGINS}"

  orchestrator:
    environment:
      AI_ORG_ENV: production

  ws-hub:
    ports: []   # No direct host exposure — Cloudflare Tunnel handles it
    environment:
      AI_ORG_ENV: production

  # ── Dashboard — served directly or via Cloudflare Pages ────────────────────
  dashboard:
    ports: []   # Exposed via Cloudflare Tunnel at your domain
    environment:
      NEXT_PUBLIC_API_URL: "https://${ORACLE_DOMAIN}"
      NEXT_PUBLIC_WS_URL: "wss://${ORACLE_DOMAIN}"
      NODE_ENV: production

  # ── Internal tools — no public exposure, Cloudflare Access protected ────────
  grafana:
    ports: []   # Exposed only via Cloudflare Access tunnel

  prometheus:
    ports: []   # Internal only

  jaeger:
    ports: []   # Internal only

  kafka-ui:
    ports: []   # Internal only

  postgres:
    ports: []   # Internal only — never expose DB to internet

  redis:
    ports: []   # Internal only

  qdrant:
    ports: []   # Internal only

  kafka:
    ports: []   # Internal only

  # ── Cloudflare Tunnel — activated in production ─────────────────────────────
  cloudflared:
    profiles: []   # Remove the "tunnel" profile so it starts automatically
    restart: always
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
